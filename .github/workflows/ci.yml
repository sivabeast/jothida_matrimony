name: Jothida Matrimony CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android platform files (if missing)
        run: |
          if [ ! -d "android/app" ]; then
            flutter create . --platforms=android --org=com.jothida --project-name=jothida_matrimony
          fi

      - name: Create .env file
        run: |
          cat > .env << EOF
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          EOF

      - name: Create google-services.json (optional)
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test --coverage
        continue-on-error: true

      - name: Build APK (Debug)
        run: flutter build apk --debug

      - name: Build APK (Release)
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release

      - name: Build AAB (Release)
        if: github.ref == 'refs/heads/main'
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jothida-matrimony-apk
          path: build/app/outputs/flutter-apk/

      - name: Upload AAB artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: jothida-matrimony-aab
          path: build/app/outputs/bundle/release/
