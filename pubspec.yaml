name: jothida_matrimony
description: Jothida Matrimony - Tamil Matrimony App with Horoscope & Porutham Analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.6
  google_sign_in: ^6.2.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.3.0

  # Payment
  razorpay_flutter: ^1.3.6

  # Environment
  flutter_dotenv: ^5.2.1

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  pin_code_fields: ^8.0.1
  photo_view: ^0.15.0
  fl_chart: ^0.70.2
  timeline_tile: ^2.0.0
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.4
  step_progress_indicator: ^1.0.2
  readmore: ^3.0.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  file_picker: ^8.1.7
  open_file: ^3.5.10
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  fluttertoast: ^8.2.10
  dropdown_search: ^5.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
