org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Jetifier is disabled: it only exists to rewrite legacy com.android.support.*
# references to AndroidX, which this project has none of (useAndroidX=true, all
# plugins are AndroidX). Leaving it on made Jetifier try to transform modern
# transitive test jars (e.g. byte-buddy), failing with "Unsupported class file
# major version 68" and breaking `flutter build apk --release` in CI.
android.enableJetifier=false
