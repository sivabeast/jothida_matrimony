name: Jothida Matrimony CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feat/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Keep in sync with the locally installed Flutter SDK (C:\dev\flutter)
          # and the committed android/ scaffolding it generated.
          flutter-version: '3.27.1'
          channel: 'stable'
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android platform files (if missing)
        run: |
          if [ ! -d "android/app" ]; then
            flutter create . --platforms=android --org=com.jothida --project-name=jothida_matrimony
          fi

      # Use a fixed, committed debug keystore so every DEBUG build has a STABLE
      # SHA-1. Without this, CI auto-generates a random keystore each run, the
      # SHA-1 changes every build, and Google Sign-In fails with ApiException 10.
      # The matching SHA-1/SHA-256 are listed in FIREBASE_SETUP.md — register
      # them once in the Firebase Console.
      #
      # This keystore is for DEBUG builds only. Release artifacts are signed
      # with the upload key materialised from secrets in the next step; a
      # release build can no longer silently fall back to this key.
      - name: Install fixed debug keystore (stable SHA-1 for Google Sign-In)
        run: |
          mkdir -p ~/.android
          cp ci/debug.keystore ~/.android/debug.keystore

      # android/key.properties and android/upload-keystore.jks are git-ignored,
      # so without this step CI has no release credentials at all. That is how
      # the debug-signed AAB that Play rejected was produced: the old Gradle
      # config quietly fell back to the debug key, and the artifact below was
      # published as if it were a release build.
      #
      # Required repository secrets (Settings → Secrets and variables → Actions):
      #   ANDROID_KEYSTORE_BASE64   base64 of android/upload-keystore.jks
      #   ANDROID_KEYSTORE_PASSWORD store password
      #   ANDROID_KEY_ALIAS         key alias (e.g. "upload")
      #   ANDROID_KEY_PASSWORD      key password
      # Create the first one with:
      #   base64 -w0 android/upload-keystore.jks        (Linux/macOS)
      #   [Convert]::ToBase64String([IO.File]::ReadAllBytes("android/upload-keystore.jks"))  (PowerShell)
      - name: Set up release signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ⚠️ Release AAB was NOT built"
              echo ""
              echo "The signing secrets are missing, so this run produced no App Bundle."
              echo "A release artifact cannot be signed without the upload key."
              echo ""
              echo "Add these under **Settings → Secrets and variables → Actions**:"
              echo ""
              echo "| Secret | Value |"
              echo "| --- | --- |"
              echo "| \`ANDROID_KEYSTORE_BASE64\` | base64 of \`android/upload-keystore.jks\` |"
              echo "| \`ANDROID_KEYSTORE_PASSWORD\` | \`storePassword\` from \`android/key.properties\` |"
              echo "| \`ANDROID_KEY_PASSWORD\` | \`keyPassword\` from the same file |"
              echo "| \`ANDROID_KEY_ALIAS\` | \`upload\` |"
              echo ""
              echo '```powershell'
              echo '[Convert]::ToBase64String([IO.File]::ReadAllBytes("android/upload-keystore.jks")) | Set-Clipboard'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            # On main the whole point of the run is to produce the uploadable
            # bundle, so a missing key is a hard failure — a silently skipped
            # artifact is too easy to miss. Other branches just carry on.
            if [ "$GITHUB_REF" = "refs/heads/main" ]; then
              echo "::error::Release signing secrets are missing — no AAB was produced. See the job summary for the 4 secrets to add."
              exit 1
            fi
            echo "::warning::Release signing secrets are missing — skipping release artifacts on this branch."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Create .env file
        run: |
          cat > .env << EOF
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          EOF

      - name: Create google-services.json (optional)
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test --coverage
        continue-on-error: true

      - name: Build APK (Debug)
        run: flutter build apk --debug

      # Release builds run ONLY when real signing credentials are available.
      # Without them the Gradle guard fails the build on purpose, so skipping
      # here keeps the pipeline green while making it impossible to publish a
      # debug-signed "release" artifact.
      - name: Build APK (Release)
        if: github.ref == 'refs/heads/main' && steps.signing.outputs.available == 'true'
        run: flutter build apk --release

      - name: Build AAB (Release)
        if: github.ref == 'refs/heads/main' && steps.signing.outputs.available == 'true'
        run: flutter build appbundle --release

      - name: Verify the AAB is release-signed
        if: github.ref == 'refs/heads/main' && steps.signing.outputs.available == 'true'
        run: |
          AAB=build/app/outputs/bundle/release/app-release.aab
          keytool -printcert -jarfile "$AAB" | tee /tmp/cert.txt
          if grep -qi "CN=Android Debug" /tmp/cert.txt; then
            echo "::error::The AAB is signed with a DEBUG certificate — Google Play will reject it."
            exit 1
          fi
          {
            echo "## ✅ Release AAB ready for Google Play"
            echo ""
            echo "Download it from the **jothida-matrimony-release-aab** artifact at the bottom of this page."
            echo ""
            echo "| | |"
            echo "| --- | --- |"
            echo "| Size | $(du -h "$AAB" | cut -f1) |"
            echo "| Signed by | $(grep -m1 'Owner:' /tmp/cert.txt | sed 's/^ *Owner: //') |"
            echo "| SHA-1 | \`$(grep -m1 'SHA1:' /tmp/cert.txt | sed 's/.*SHA1: //')\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jothida-matrimony-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload AAB artifact
        if: github.ref == 'refs/heads/main' && steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jothida-matrimony-release-aab
          path: build/app/outputs/bundle/release/
