plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.jothida.jothida_matrimony"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.jothida.jothida_matrimony"
        // firebase_auth requires minSdk 23.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        // Pin the debug keystore to the one committed at ci/debug.keystore so
        // every machine produces the same SHA-1 — the fingerprint registered
        // in the Firebase console (required for Google Sign-In & Phone auth).
        debug {
            storeFile file("../../ci/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            // TODO(step 8): replace with a dedicated release keystore before
            // publishing to the Play Store. Using the pinned debug keystore for
            // now so `flutter run --release` works with Google Sign-In.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
